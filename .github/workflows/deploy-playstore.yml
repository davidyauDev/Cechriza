name: Deploy Android AAB to Play Console

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Validate required secrets
        env:
          PLAY_STORE_JSON_KEY: ${{ secrets.PLAY_STORE_JSON_KEY }}
          ANDROID_SIGNING_KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
        run: |
          missing=0
          for key in PLAY_STORE_JSON_KEY ANDROID_SIGNING_KEYSTORE_BASE64 ANDROID_SIGNING_KEY_ALIAS ANDROID_SIGNING_KEY_PASSWORD ANDROID_SIGNING_STORE_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "Required secrets are missing. Aborting."
            exit 1
          fi

      - name: Create Play Service Account file (temp)
        env:
          PLAY_STORE_JSON_KEY: ${{ secrets.PLAY_STORE_JSON_KEY }}
        run: |
          printf '%s' "$PLAY_STORE_JSON_KEY" > "$RUNNER_TEMP/play-store-key.json"

      - name: Create Android keystore (temp)
        env:
          ANDROID_SIGNING_KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_SIGNING_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/upload-keystore.jks"

      - name: Grant execute permission for Gradle
        run: chmod +x ./gradlew

      - name: Build signed release AAB
        env:
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
        run: |
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          VERSION_CODE=$((10000 + GITHUB_RUN_NUMBER))
          echo "Building with VERSION_NAME=$VERSION_NAME VERSION_CODE=$VERSION_CODE"
          ./gradlew --no-daemon clean bundleRelease \
            -PCI_VERSION_CODE=$VERSION_CODE \
            -PCI_VERSION_NAME="$VERSION_NAME" \
            -Pandroid.injected.signing.store.file="$RUNNER_TEMP/upload-keystore.jks" \
            -Pandroid.injected.signing.store.password="$ANDROID_SIGNING_STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_SIGNING_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_SIGNING_KEY_PASSWORD"

      - name: Verify generated AAB
        run: |
          shopt -s nullglob
          files=(app/build/outputs/bundle/release/*.aab)
          if [ "${#files[@]}" -ne 1 ]; then
            echo "Expected exactly one AAB, found ${#files[@]}"
            ls -lah app/build/outputs/bundle/release || true
            exit 1
          fi
          ls -lah "${files[0]}"

      - name: Upload AAB to Google Play (internal)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ runner.temp }}/play-store-key.json
          packageName: com.cechriza.app
          releaseFiles: app/build/outputs/bundle/release/*.aab
          tracks: internal
          status: completed
